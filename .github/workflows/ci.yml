name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: toolwatch
          POSTGRES_USER: toolwatch
          POSTGRES_PASSWORD: toolwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U toolwatch -d toolwatch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://toolwatch:toolwatch@localhost:5432/toolwatch
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.13
      - name: Install locked dependencies
        run: uv sync --frozen
      - name: Lint and format
        run: make lint
      - name: Type check
        run: make typecheck
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: Check migration drift
        run: uv run alembic check
      - name: Test without local LLM
        run: make test
      - name: Build and verify packages
        run: make package-check

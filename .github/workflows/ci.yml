name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: toolwatch
          POSTGRES_USER: toolwatch
          POSTGRES_PASSWORD: toolwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U toolwatch -d toolwatch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://toolwatch:toolwatch@localhost:5432/toolwatch
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.23"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Type check
        run: uv run pyright
      - name: Apply migrations
        run: uv run alembic upgrade head
      - name: Test
        run: uv run pytest -m "not local_llm"

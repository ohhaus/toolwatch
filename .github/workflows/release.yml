name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: toolwatch
          POSTGRES_USER: toolwatch
          POSTGRES_PASSWORD: toolwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U toolwatch -d toolwatch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://toolwatch:toolwatch@localhost:5432/toolwatch
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: false
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: Validate tag matches package version
        run: test "${GITHUB_REF_NAME}" = "v$(uv run python -c 'import toolwatch; print(toolwatch.__version__)')"
      - run: make lint
      - run: make typecheck
      - run: uv run alembic upgrade head
      - run: uv run alembic check
      - run: uv run alembic downgrade 0006_ollama_agent_loop_v1
      - run: uv run alembic upgrade head
      - run: make test
      - run: make package-check
      - name: Build release image
        run: >-
          docker build
          --build-arg VERSION=0.1.0
          --build-arg "REVISION=${GITHUB_SHA}"
          --build-arg "SOURCE_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          -t toolwatch:0.1.0 .
      - name: Generate SPDX SBOMs
        run: make sbom
      - name: Export release image
        run: docker save -o dist/toolwatch-0.1.0-image.tar toolwatch:0.1.0
      - name: Scan release image
        run: >-
          docker run --rm -v "$PWD/dist:/scan:ro"
          aquasec/trivy@sha256:a22415a38938a56c379387a8163fcb0ce38b10ace73e593475d3658d578b2436
          image --input /scan/toolwatch-0.1.0-image.tar
          --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1
      - name: Attest Python release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.2.0
        with:
          subject-path: |
            dist/toolwatch-0.1.0-*.whl
            dist/toolwatch-0.1.0.tar.gz
      - name: Attest release image archive
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.2.0
        with:
          subject-path: "dist/toolwatch-0.1.0-image.tar"
      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: toolwatch-v0.1.0
          path: |
            dist/toolwatch-0.1.0*
            dist/*.spdx.json
          if-no-files-found: error
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          dist/toolwatch-0.1.0*
          dist/*.spdx.json
          --verify-tag
          --notes-file docs/releases/0.1.0.md

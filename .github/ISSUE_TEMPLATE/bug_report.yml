name: Bug report
description: Report a reproducible ToolWatch defect (not a vulnerability).
body:
  - type: markdown
    attributes:
      value: Security reports must follow SECURITY.md and must not be filed publicly.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

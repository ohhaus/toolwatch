services:
  api:
    build:
      context: .
    environment:
      APP_NAME: ToolWatch
      APP_VERSION: 0.1.0
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://toolwatch:toolwatch@postgres:5432/toolwatch
      DATABASE_POOL_SIZE: 5
      DATABASE_MAX_OVERFLOW: 10
      DATABASE_CONNECT_TIMEOUT_SECONDS: 5
      STORE_PROMPTS: "false"
      DEFAULT_TOOL_TIMEOUT_SECONDS: 10
      MAX_TOOL_TIMEOUT_SECONDS: 30
      MAX_TOOL_ARGUMENTS_BYTES: 65536
      MAX_TOOL_RESULT_BYTES: 524288
      MAX_JSON_DEPTH: 20
      MAX_STRING_LENGTH: 51200
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: toolwatch
      OTEL_SERVICE_VERSION: 0.1.0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: prometheus
      OTEL_TRACE_SAMPLE_RATIO: 1.0
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
      METRICS_ENABLED: "true"
      METRICS_PATH: /metrics
      DASHBOARD_ENABLED: "true"
      DASHBOARD_PREFIX: /ui
      DASHBOARD_PAGE_SIZE: 25
      DASHBOARD_MAX_PAGE_SIZE: 100
      DASHBOARD_REFRESH_SECONDS: 10
      ATTACK_LAB_ENABLED: "true"
      JAEGER_UI_PUBLIC_URL: http://localhost:16686
      AGENT_PROVIDER: fake
      OLLAMA_MODEL: qwen3:4b
      OLLAMA_ALLOWED_MODELS: qwen3:4b
      FAKE_AGENT_MODEL: fake-v1
      FAKE_AGENT_ALLOWED_MODELS: fake-v1
      OLLAMA_THINK: "false"
      AGENT_MAX_TURNS: 8
      AGENT_MAX_TOOL_CALLS: 16
      AGENT_MAX_TOOLS_PER_TURN: 4
      AGENT_RUN_TIMEOUT_SECONDS: 180
      RECOVERY_ENABLED: "true"
      TOOL_CALL_STALE_AFTER_SECONDS: 300
      AGENT_RUN_STALE_AFTER_SECONDS: 300
      MODEL_CALL_STALE_AFTER_SECONDS: 180
      RECOVERY_BATCH_SIZE: 100
      SHUTDOWN_GRACE_PERIOD_SECONDS: 15
    command:
      - /bin/sh
      - -c
      - alembic upgrade head && exec uvicorn toolwatch.main:app --host 0.0.0.0 --port 8000
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen("http://127.0.0.1:8000/health/live", timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - toolwatch

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: toolwatch
      POSTGRES_USER: toolwatch
      POSTGRES_PASSWORD: toolwatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolwatch -d toolwatch"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - toolwatch

  jaeger:
    image: jaegertracing/jaeger:2.6.0
    profiles: ["observability"]
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    networks:
      - toolwatch

volumes:
  postgres_data:

networks:
  toolwatch:

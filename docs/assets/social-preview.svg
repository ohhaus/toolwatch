<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="ToolWatch social preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FB950"/>
      <stop offset="100%" stop-color="#2EA043"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <g opacity="0.06" stroke="#3FB950" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <g transform="translate(80,80)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="800" fill="#e6edf3" letter-spacing="-3">ToolWatch</text>
    <rect x="0" y="20" width="180" height="6" fill="url(#accent)" rx="3"/>
    <text x="0" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="500" fill="#8b949e">Observe and control every action</text>
    <text x="0" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="500" fill="#8b949e">your AI agent takes.</text>
  </g>

  <g transform="translate(80,420)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="110" y="50" text-anchor="middle" font-size="28" font-weight="600" fill="#e6edf3">AI Agent</text>
    </g>

    <g transform="translate(230,40)" stroke="#3FB950" stroke-width="2.5" fill="none">
      <line x1="0" y1="0" x2="60" y2="0"/>
      <polygon points="60,0 50,-7 50,7" fill="#3FB950"/>
    </g>

    <g transform="translate(300,0)">
      <rect x="0" y="0" width="280" height="80" rx="10" fill="#0d3a1e" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
      <text x="140" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#3FB950">ToolWatch</text>
    </g>

    <g transform="translate(590,40)" stroke="#3FB950" stroke-width="2.5" fill="none">
      <line x1="0" y1="0" x2="60" y2="0"/>
      <polygon points="60,0 50,-7 50,7" fill="#3FB950"/>
    </g>

    <g transform="translate(660,0)">
      <rect x="0" y="0" width="220" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="110" y="50" text-anchor="middle" font-size="28" font-weight="600" fill="#e6edf3">Tool</text>
    </g>
  </g>

  <g transform="translate(960,80)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="220" height="56" rx="28" fill="#0d3a1e" stroke="#3FB950" stroke-width="2"/>
      <circle cx="38" cy="28" r="10" fill="#3FB950"/>
      <text x="68" y="37" font-size="22" font-weight="700" fill="#3FB950" letter-spacing="2">ALLOW</text>
    </g>
    <g transform="translate(0,80)">
      <rect x="0" y="0" width="220" height="56" rx="28" fill="#3d2e0a" stroke="#d29922" stroke-width="2"/>
      <circle cx="38" cy="28" r="10" fill="#d29922"/>
      <text x="68" y="37" font-size="22" font-weight="700" fill="#d29922" letter-spacing="2">FLAG</text>
    </g>
    <g transform="translate(0,160)">
      <rect x="0" y="0" width="220" height="56" rx="28" fill="#3d1218" stroke="#f85149" stroke-width="2"/>
      <circle cx="38" cy="28" r="10" fill="#f85149"/>
      <text x="68" y="37" font-size="22" font-weight="700" fill="#f85149" letter-spacing="2">BLOCK</text>
    </g>
  </g>

  <g transform="translate(80,360)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="0" y="0" font-size="22" font-weight="500" fill="#7d8590" letter-spacing="3">RUNTIME SAFETY  ·  AUDIT  ·  TRACING  ·  LOCAL AI</text>
  </g>
</svg>
